name: Run Daily Algorithm

on:
  schedule:
    # 08:30 KST (= 23:30 UTC 전날) — 평일(KST 기준 월-금)
    - cron: '30 23 * * 0-4'
  workflow_dispatch:
    inputs:
      date:
        description: '대상 날짜 (YYYY-MM-DD, 기본: 오늘)'
        required: false
      market:
        description: '시장 (KOSPI | KOSDAQ | ALL)'
        required: false
        default: 'KOSPI'
      dry_run:
        description: 'DB 저장 없이 출력만 (true/false)'
        required: false
        default: 'false'

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run algorithm
        run: |
          python run_algorithm.py \
            ${{ github.event.inputs.date && format('--date {0}', github.event.inputs.date) || '' }} \
            --market ${{ github.event.inputs.market || 'KOSPI' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Discord (추천 완료)
        if: success() && github.event.inputs.dry_run != 'true'
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"content": "✅ SignalFlow 오늘의 추천 종목 생성 완료"}'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true
